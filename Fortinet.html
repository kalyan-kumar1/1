<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYS_ADMIN.CONF — Infrastructure Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A1420;
    --bg-panel:#0F1D30;
    --bg-panel-2:#13233A;
    --grid-line:rgba(140,178,220,0.08);
    --border:#1E3350;
    --border-soft:#182B45;
    --accent:#FF7A1A;
    --accent-dim:rgba(255,122,26,0.15);
    --accent-2:#57D9C4;
    --accent-2-dim:rgba(87,217,196,0.15);
    --text:#EAF1F8;
    --text-dim:#8AA3C0;
    --text-faint:#4C6486;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --sans:'IBM Plex Sans', system-ui, sans-serif;
    --display:'Space Grotesk', system-ui, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:32px 32px;
  }
  ::selection{background:var(--accent); color:#0A1420;}
  :focus-visible{outline:2px solid var(--accent-2); outline-offset:3px;}

  .card{
    width:100%;
    max-width:640px;
    background:var(--bg-panel);
    border:1px solid var(--border-soft);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }

  .card-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    border-bottom:1px solid var(--border-soft);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.04em;
    background:var(--bg-panel-2);
  }
  .card-top .logo{display:flex; align-items:center; gap:8px; font-weight:600;}
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--accent-2);
    box-shadow:0 0 0 3px var(--accent-2-dim);
    animation:pulse-dot 2.2s ease-in-out infinite;
  }
  @keyframes pulse-dot{0%,100%{opacity:1;} 50%{opacity:.35;}}
  .card-top-right{color:var(--text-faint);}
  #uptime{color:var(--text-dim);}

  .card-head{
    padding:18px 20px 6px;
  }
  .card-head .eyebrow{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:6px;
  }
  .card-head h1{
    font-family:var(--display);
    font-weight:600;
    font-size:18px;
    letter-spacing:-0.01em;
  }

  .body-grid{
    display:grid;
    grid-template-columns:200px 1fr;
    gap:0;
    min-height:300px;
  }
  @media (max-width:520px){
    .body-grid{grid-template-columns:1fr;}
  }

  .topo-map{
    padding:10px;
    border-right:1px solid var(--border-soft);
    display:flex;
    align-items:center;
  }
  @media (max-width:520px){
    .topo-map{border-right:none; border-bottom:1px solid var(--border-soft);}
  }
  .topo-map svg{width:100%;height:auto;display:block;}

  .spoke-line{stroke:var(--border); stroke-width:1.3; transition:stroke .2s ease;}
  .spoke-line.active{stroke:var(--accent);}

  .node-circle{fill:var(--bg-panel-2); stroke:var(--border); stroke-width:1.3; transition:fill .18s ease, stroke .18s ease;}
  .node-group{cursor:pointer;}
  .node-group:hover .node-circle{stroke:var(--accent-2); fill:var(--accent-2-dim);}
  .node-group.active .node-circle{stroke:var(--accent); fill:var(--accent-dim);}
  .node-code{font-family:var(--mono); font-size:8px; fill:var(--text-faint); text-anchor:middle; pointer-events:none;}
  .node-label{
    font-family:var(--mono); font-size:8.3px; fill:var(--text-dim);
    text-anchor:middle; pointer-events:none; text-transform:uppercase;
  }
  .node-group:hover .node-label, .node-group.active .node-label{fill:var(--text);}

  .hub-circle{fill:var(--bg); stroke:var(--accent); stroke-width:1.4;}
  .hub-label{font-family:var(--mono); font-size:9px; fill:var(--accent); text-anchor:middle; font-weight:600;}
  .hub-sub{font-family:var(--mono); font-size:6.6px; fill:var(--text-faint); text-anchor:middle;}

  .ping-ring{fill:none; stroke:var(--accent); stroke-width:1; opacity:0; transform-origin:150px 150px;}
  @keyframes ping{0%{opacity:.5; r:26;} 100%{opacity:0; r:48;}}
  .ping-ring{animation:ping 3.2s ease-out infinite;}
  .ping-ring.d2{animation-delay:1.6s;}

  .detail{
    padding:18px 20px;
    display:flex;
    flex-direction:column;
  }
  .detail .code{
    font-family:var(--mono); font-size:10px; color:var(--accent);
    letter-spacing:0.08em; margin-bottom:8px;
  }
  .detail h3{
    font-family:var(--display); font-size:17px; font-weight:600; margin-bottom:6px;
  }
  .detail .desc{
    color:var(--text-dim); font-size:12.5px; margin-bottom:14px; max-width:42ch;
  }
  .detail ul{
    list-style:none; display:flex; flex-direction:column; gap:8px;
    margin-top:auto; padding-top:12px; border-top:1px dashed var(--border-soft);
  }
  .detail li{
    display:flex; align-items:flex-start; gap:8px;
    font-size:12px; color:var(--text);
  }
  .detail li::before{content:"▸"; color:var(--accent-2); font-size:11px; margin-top:1px; flex-shrink:0;}
  .hint{font-family:var(--mono); font-size:10px; color:var(--text-faint); margin-top:12px;}

  .card-foot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 16px;
    border-top:1px solid var(--border-soft);
    font-family:var(--mono);
    font-size:10px;
    color:var(--text-faint);
    background:var(--bg-panel-2);
  }
  .cursor-blink{
    display:inline-block; width:6px; height:11px; background:var(--accent-2);
    animation:blink 1s step-end infinite; vertical-align:middle; margin-left:3px;
  }
  @keyframes blink{50%{opacity:0;}}

  /* Workflow layers */
  .workflows{
    border-top:1px solid var(--border-soft);
    background:var(--bg-panel-2);
  }
  .wf-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:14px 20px 0;
  }
  .wf-head .eyebrow{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--accent);
  }
  .wf-head .wf-count{
    font-family:var(--mono);
    font-size:10px;
    color:var(--text-faint);
  }
  .wf-tabs{
    display:flex;
    gap:2px;
    padding:10px 20px 0;
    overflow-x:auto;
  }
  .wf-tab{
    flex:1;
    min-width:0;
    background:transparent;
    border:1px solid var(--border-soft);
    border-bottom:none;
    border-radius:4px 4px 0 0;
    padding:8px 8px 7px;
    cursor:pointer;
    font-family:var(--mono);
    text-align:left;
    transition:background .15s ease, border-color .15s ease;
  }
  .wf-tab:hover{border-color:var(--border);}
  .wf-tab .wf-tab-idx{
    display:block;
    font-size:9px;
    color:var(--text-faint);
    letter-spacing:0.08em;
  }
  .wf-tab .wf-tab-name{
    display:block;
    font-size:10.5px;
    letter-spacing:0.04em;
    color:var(--text-dim);
    text-transform:uppercase;
    margin-top:2px;
  }
  .wf-tab.active{
    background:var(--bg-panel);
    border-color:var(--border);
  }
  .wf-tab.active .wf-tab-idx{color:var(--accent);}
  .wf-tab.active .wf-tab-name{color:var(--text);}

  .wf-panel{
    background:var(--bg-panel);
    border-top:1px solid var(--border);
    padding:16px 20px 20px;
  }
  .wf-panel .wf-scope{
    font-family:var(--mono);
    font-size:10px;
    color:var(--accent-2);
    letter-spacing:0.06em;
    margin-bottom:6px;
  }
  .wf-panel h4{
    font-family:var(--display);
    font-weight:600;
    font-size:15px;
    margin-bottom:5px;
  }
  .wf-panel .wf-desc{
    color:var(--text-dim);
    font-size:12px;
    max-width:52ch;
    margin-bottom:12px;
  }
  .wf-steps{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:7px;
  }
  .wf-steps li{
    display:flex;
    align-items:flex-start;
    gap:8px;
    font-size:11.5px;
    color:var(--text);
  }
  .wf-steps li .wf-step-no{
    font-family:var(--mono);
    font-size:9.5px;
    color:var(--text-faint);
    flex-shrink:0;
    padding-top:1px;
    min-width:16px;
  }
  @media (max-width:520px){
    .wf-tabs{padding:10px 14px 0;}
    .wf-tab .wf-tab-name{font-size:9.5px;}
    .wf-panel{padding:14px 14px 18px;}
  }
</style>
</head>
<body>

  <div class="card">
    <div class="card-top">
      <div class="logo"><span class="dot"></span> SYS_ADMIN.CONF</div>
      <div class="card-top-right">UPTIME <span id="uptime">00:00:00</span></div>
    </div>

    <div class="card-head">
      <div class="eyebrow">Infrastructure Map</div>
      <h1>Six domains, one operator</h1>
    </div>

    <div class="body-grid">
      <div class="topo-map">
        <svg id="topoSvg" viewBox="0 0 300 300" role="group" aria-label="Interactive infrastructure topology diagram">
          <g id="spokes"></g>
          <circle class="ping-ring" cx="150" cy="150" r="26"></circle>
          <circle class="ping-ring d2" cx="150" cy="150" r="26"></circle>
          <g>
            <circle class="hub-circle" cx="150" cy="150" r="26"></circle>
            <text class="hub-label" x="150" y="148">CORE</text>
            <text class="hub-sub" x="150" y="157">IT OPS</text>
          </g>
          <g id="nodes"></g>
        </svg>
      </div>

      <div class="detail" id="detailPanel"></div>
    </div>

    <div class="workflows">
      <div class="wf-head">
        <div class="eyebrow">Workflow Layers</div>
        <div class="wf-count">4 ALTITUDES</div>
      </div>
      <div class="wf-tabs" id="wfTabs" role="tablist" aria-label="Workflow altitude"></div>
      <div class="wf-panel" id="wfPanel"></div>
    </div>

    <div class="card-foot">
      <span>// 06 NODES ONLINE<span class="cursor-blink"></span></span>
      <span>FR · US · CN · IN · CH · MA</span>
    </div>
  </div>

<script>
(function(){
  "use strict";

  var start = Date.now();
  function pad(n){ return String(n).padStart(2,'0'); }
  function tickUptime(){
    var diff = Math.floor((Date.now() - start)/1000);
    var h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
    var elx = document.getElementById('uptime');
    if(elx) elx.textContent = pad(h)+':'+pad(m)+':'+pad(s);
  }
  setInterval(tickUptime, 1000);
  tickUptime();

  var hubX = 150, hubY = 150, r = 108;
  function pt(angleDeg){
    var a = (angleDeg * Math.PI) / 180;
    return { x: hubX + r * Math.cos(a), y: hubY + r * Math.sin(a) };
  }
  var p0 = pt(-90), p1 = pt(-30), p2 = pt(30), p3 = pt(90), p4 = pt(150), p5 = pt(210);

  var nodes = [
    { id:'net', code:'N01', x:p0.x, y:p0.y, label:'Network',
      title:'Telephony & Network Security',
      desc:'Core voice and perimeter infrastructure keeping every site connected.',
      items:['PABX server administration','Firewall configuration (Fortinet)'] },
    { id:'virt', code:'N02', x:p1.x, y:p1.y, label:'Virtualization',
      title:'Virtualization & App Servers',
      desc:'Server migration and centralized engineering software delivery.',
      items:['Physical → virtual server migration (VMware)','Floating-license app server: SolidWorks, Creo, Janus NX'] },
    { id:'backup', code:'N03', x:p2.x, y:p2.y, label:'Backup',
      title:'Data Recovery & Backup',
      desc:'Redundant recovery paths across multiple backup platforms.',
      items:['Backup and recovery with Veeam','Cobian Backup & AppAssure','Veritas enterprise backup'] },
    { id:'machine', code:'N04', x:p3.x, y:p3.y, label:'Machine Tools',
      title:'Machine Tool Integration',
      desc:'Bridging shop-floor equipment with the server infrastructure.',
      items:['Machine tool software installation & maintenance','Server interfacing: GEDIX, Trumpf, Zeiss, Amada, Prima'] },
    { id:'deploy', code:'N05', x:p4.x, y:p4.y, label:'Deployment',
      title:'Deployment & Security',
      desc:'Standardized imaging, business software rollout, mail security.',
      items:['OS imaging & deployment via MDT','Finance software: Sage, Quadratus','MailInBlack + sandbox implementation','In-house email signature generator'] },
    { id:'monitor', code:'N06', x:p5.x, y:p5.y, label:'Monitoring',
      title:'Monitoring, Ticketing & Support',
      desc:'Visibility into infrastructure health and frontline user support.',
      items:['Server monitoring: Zabbix & Grafana','GLPI ticketing system','Support across FR, US, CN, IN, CH, MA'] }
  ];

  var svgNS = "http://www.w3.org/2000/svg";
  var spokesG = document.getElementById('spokes');
  var nodesG = document.getElementById('nodes');
  var detailPanel = document.getElementById('detailPanel');

  function el(tag, attrs){
    var e = document.createElementNS(svgNS, tag);
    for(var k in attrs){ e.setAttribute(k, attrs[k]); }
    return e;
  }

  nodes.forEach(function(n){
    var line = el('line', { x1:hubX, y1:hubY, x2:n.x, y2:n.y, class:'spoke-line', 'data-id':n.id });
    spokesG.appendChild(line);

    var g = el('g', { class:'node-group', 'data-id':n.id, tabindex:'0', role:'button', 'aria-label':n.title });
    var circle = el('circle', { cx:n.x, cy:n.y, r:20, class:'node-circle' });
    var code = el('text', { x:n.x, y:n.y - 3, class:'node-code' });
    code.textContent = n.code;
    var label = el('text', { x:n.x, y:n.y + 8, class:'node-label' });
    label.textContent = n.label;

    g.appendChild(circle);
    g.appendChild(code);
    g.appendChild(label);
    nodesG.appendChild(g);

    function activate(){
      document.querySelectorAll('.node-group').forEach(function(node){ node.classList.remove('active'); });
      document.querySelectorAll('.spoke-line').forEach(function(l){ l.classList.remove('active'); });
      g.classList.add('active');
      line.classList.add('active');
      renderDetail(n);
    }

    g.addEventListener('click', activate);
    g.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); activate(); }
    });
  });

  function renderDetail(n){
    var itemsHtml = n.items.map(function(it){ return '<li>'+it+'</li>'; }).join('');
    detailPanel.innerHTML =
      '<div class="code">'+n.code+' // ACTIVE</div>' +
      '<h3>'+n.title+'</h3>' +
      '<p class="desc">'+n.desc+'</p>' +
      '<ul>'+itemsHtml+'</ul>';
  }

  function renderIdle(){
    detailPanel.innerHTML =
      '<div class="code">SELECT A NODE</div>' +
      '<h3>Infrastructure map</h3>' +
      '<p class="desc">Six operational domains branch out from day-to-day IT operations.</p>' +
      '<p class="hint"> ← click or Tab + Enter</p>';
  }
  renderIdle();

  // Workflow layers: Strategic -> Tactical -> Operational -> Technical
  var workflows = [
    { id:'strategic', idx:'01', name:'Strategic', scope:'12–36 MO HORIZON',
      title:'Infrastructure roadmap & risk posture',
      desc:'Long-range decisions on what the environment should look like, who owns it, and what it can survive.',
      steps:[
        'Set multi-year infrastructure roadmap: consolidation, refresh cycles, cloud vs on-prem posture',
        'Define disaster recovery & business continuity targets (RTO/RPO) across FR, US, CN, IN, CH, MA',
        'Select and standardize core platforms: Fortinet, VMware, Veeam, Zabbix as enterprise defaults',
        'Own the annual IT capital plan and vendor/license consolidation strategy'
      ]},
    { id:'tactical', idx:'02', name:'Tactical', scope:'QUARTERLY / PROJECT',
      title:'Rollouts, migrations & standardization projects',
      desc:'Translating the roadmap into scoped initiatives with a start, an end, and a measurable outcome.',
      steps:[
        'Plan and sequence physical → virtual migration waves site by site',
        'Roll out MDT-based OS imaging standard across new and refreshed machines',
        'Coordinate MailInBlack + sandbox deployment and Sage/Quadratus rollout with site leads',
        'Run quarterly backup platform review across Veeam, Cobian/AppAssure, and Veritas'
      ]},
    { id:'operational', idx:'03', name:'Operational', scope:'DAILY / WEEKLY', 
      title:'Keeping the six domains healthy',
      desc:'The recurring cadence that keeps monitoring green and users unblocked.',
      steps:[
        'Triage and route tickets through GLPI; track SLA across all six sites',
        'Review Zabbix & Grafana alerts each morning; confirm overnight backup jobs completed',
        'Provision and support PABX, firewall, and app-server access requests',
        'Frontline support for FR, US, CN, IN, CH, MA end users'
      ]},
    { id:'technical', idx:'04', name:'Technical', scope:'HANDS-ON EXECUTION',
      title:'The actual config, scripts & interfacing',
      desc:'The specific, machine-level work each domain needs to keep running.',
      steps:[
        'Write and maintain Fortinet firewall rules and PABX server configuration',
        'Administer VMware hosts and floating licenses for SolidWorks, Creo, Janus NX',
        'Interface machine tool software with servers: GEDIX, Trumpf, Zeiss, Amada, Prima',
        'Build and maintain the in-house email signature generator and internal tooling'
      ]}
  ];

  var wfTabs = document.getElementById('wfTabs');
  var wfPanel = document.getElementById('wfPanel');

  function renderWfPanel(w){
    var stepsHtml = w.steps.map(function(s, i){
      return '<li><span class="wf-step-no">'+String(i+1).padStart(2,'0')+'</span><span>'+s+'</span></li>';
    }).join('');
    wfPanel.innerHTML =
      '<div class="wf-scope">'+w.scope+'</div>' +
      '<h4>'+w.title+'</h4>' +
      '<p class="wf-desc">'+w.desc+'</p>' +
      '<ul class="wf-steps">'+stepsHtml+'</ul>';
  }

  function activateWf(w, tabEl){
    document.querySelectorAll('.wf-tab').forEach(function(t){
      t.classList.remove('active');
      t.setAttribute('aria-selected','false');
    });
    tabEl.classList.add('active');
    tabEl.setAttribute('aria-selected','true');
    renderWfPanel(w);
  }

  workflows.forEach(function(w, i){
    var tab = document.createElement('button');
    tab.className = 'wf-tab';
    tab.type = 'button';
    tab.setAttribute('role','tab');
    tab.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
    tab.innerHTML = '<span class="wf-tab-idx">'+w.idx+'</span><span class="wf-tab-name">'+w.name+'</span>';
    tab.addEventListener('click', function(){ activateWf(w, tab); });
    wfTabs.appendChild(tab);
    if(i === 0){ tab.classList.add('active'); }
  });

  renderWfPanel(workflows[0]);

})();
</script>
</body>
</html>
